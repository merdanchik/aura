<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Аура</title>
  <script>
    // GitHub Pages SPA redirect — segmentCount=1 for project page at /aura/
    var segmentCount = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + '/' +
      l.pathname.slice(1).split('/').slice(0, segmentCount).join('/') +
      '/?p=/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
